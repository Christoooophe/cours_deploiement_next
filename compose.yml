services:

  node:
    container_name: node
    image: node:26-alpine3.24
    working_dir: /front
    volumes:
      - ./:/front
    ports:
      - "3000:3000"
    # Lance un terminal pour garder le conteneur ouvert
    tty: true
    networks:
      - deploy-app

  postgres:
    container_name: postgres
    image: postgres:18-alpine3.24
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - deploy_data:/var/lib/postgresql/18/docker
    networks:
      - deploy-app

  redis:
    container_name: redis
    image: redis:8.8-alpine3.23
    ports:
      - '6379:6379'
    volumes:
      - deploy_redis_data:/data
    environment:
      - REDIS_ARGS=${REDIS_ARG}
    networks:
      - deploy-app

networks:
  deploy-app:
    driver: bridge

volumes:
  deploy_data:
  deploy_redis_data:
    driver: local
