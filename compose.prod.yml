services:

  app:
    build: .
    image: ghcr.io/christoooophe/cours_deploiement_next:cache
    networks:
      - deploy-app
    ports:
      - "3000:3000"

  postgres:
    container_name: postgres
    image: postgres:18-alpine3.24
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - deploy_data:/var/lib/postgresql/18/docker
    networks:
      - deploy-app
    ports:
      - "5432:5432"

  redis:
    container_name: redis
    image: redis:8.8-alpine3.23
    volumes:
      - deploy_redis_data:/data
    environment:
      - REDIS_ARGS=${REDIS_ARG}
    networks:
      - deploy-app
    ports:
      - "6379:6379"

networks:
  deploy-app:
    driver: bridge

volumes:
  deploy_data:
  deploy_redis_data:
    driver: local
