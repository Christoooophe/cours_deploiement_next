name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - prod
      - main

jobs:
  build_docker:
    runs-on: ubuntu-latest

    steps:
      - name: install checkout
        uses: actions/checkout@v7

      - name: check version docker
        run: |
          docker -v
          docker compose version

      - name: docker up
        #pas besoin de --build car il créé de zéro
        run: docker compose up -d
