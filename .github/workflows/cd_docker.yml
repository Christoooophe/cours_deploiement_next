name: cd_docker.yml
on:
  push:
#  workflow_run:
#    workflows:
#      - CI
#    types:
#      - completed
    branches:
      - main

permissions:
  contents: read
  packages: write
  actions: read

env:
  IMAGE-NAME: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    #if: ${{github.event.workflow_run.conclusion == 'success'}}

    steps:
      - name: config docker buildX
        uses: docker/setup-buildx-action@v4

      - name: connect to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Tags && labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE-NAME }}
          tags: |
            type=ref,event=branch
            type=sha, prefix=sha-

      - name: Build and push on ghcr
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE-NAME }}:cache
          cache-to: type=registry,ref=${{ env.IMAGE-NAME }}:cache,mode=max
